<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>field notes bakery</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f4ef;
      --paper: #fbfaf7;
      --ink: #252521;
      --soft: #4b4a45;
      --muted: #8d887f;
      --line: #ddd7ce;
      --dark: #2d2c28;
      --max: 1160px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      font-weight: 300;
    }

    img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 22px 0;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 30px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      letter-spacing: 0.01em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 30px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
    }

    .nav-links a.active {
      border-bottom: 1px solid var(--ink);
    }

    .ig {
      width: 22px;
      height: 22px;
      border: 2px solid var(--ink);
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .ig::before {
      content: '';
      width: 7px;
      height: 7px;
      border: 2px solid var(--ink);
      border-radius: 50%;
    }

    .ig::after {
      content: '';
      width: 3px;
      height: 3px;
      background: var(--ink);
      border-radius: 50%;
      position: absolute;
      top: 4px;
      right: 4px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: 12px;
      color: var(--ink);
      margin-bottom: 28px;
      font-weight: 400;
    }

    h1, h2, h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      line-height: 1.02;
      margin: 0;
    }

    h1 {
      font-size: clamp(64px, 8vw, 92px);
      max-width: 430px;
      margin-bottom: 28px;
    }

    h2 {
      font-size: 32px;
      margin-bottom: 14px;
    }

    h3 {
      font-size: 27px;
    }

    p {
      margin: 0;
      color: var(--soft);
      font-size: 17px;
    }

    .hero {
      display: grid;
      grid-template-columns: 0.88fr 1.42fr;
      gap: 56px;
      align-items: center;
      padding: 12px 0 28px;
    }

    .hero p {
      max-width: 370px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--ink);
      line-height: 1.45;
    }
